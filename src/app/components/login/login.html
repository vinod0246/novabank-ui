<div class="login-container">
  <div class="login-box">

    <div class="logo">
      <h1>🏦 NovaBank</h1>
      <p>Banking Microservices Platform</p>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input
        type="text"
        [(ngModel)]="username"
        placeholder="Enter username"
        class="form-control"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Enter password"
        class="form-control"/>
    </div>

    <div class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button class="login-btn" (click)="login()">
      Login
    </button>

    <p class="hint">Use: vinod / vinod123</p>
  </div>
</div>
